# Build SageMaker images on PRs (no AWS) to catch broken Dockerfiles.
name: ML Docker CI

on:
  pull_request:
    paths:
      - "ml/containers/**"
      - "ml/src/**"
      - ".github/workflows/ml-docker-ci.yml"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build churn-train
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ml/containers/train.Dockerfile
          push: false
          tags: churn-train:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build churn-infer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ml/containers/inference.Dockerfile
          push: false
          tags: churn-infer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build churn-preprocess
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ml/containers/preprocess.Dockerfile
          push: false
          tags: churn-preprocess:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
