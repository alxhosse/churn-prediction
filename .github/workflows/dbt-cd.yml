# Manual dbt build on Athena (OIDC). Secrets: ATHENA_* + ATHENA_ML_EXPORT_* (real S3 prefixes) + AWS_ROLE_ARN; Terraform OIDC trust for this repo.
name: dbt CD — Athena

on:
  workflow_dispatch:

env:
  # Prefer Actions secret (many repos store this only as a secret); else variable; else default.
  AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-1' }}
  DBT_TARGET: ci

permissions:
  contents: read
  id-token: write

jobs:
  dbt-athena:
    runs-on: ubuntu-latest
    env:
      ATHENA_DATABASE: ${{ secrets.ATHENA_DATABASE }}
      ATHENA_SCHEMA: ${{ secrets.ATHENA_SCHEMA }}
      ATHENA_S3_STAGING_DIR: ${{ secrets.ATHENA_S3_STAGING_DIR }}
      ATHENA_S3_DATA_DIR: ${{ secrets.ATHENA_S3_DATA_DIR }}
      ATHENA_WORK_GROUP: ${{ secrets.ATHENA_WORK_GROUP }}
      # Required for Athena CTAS marts (Parquet); must be real s3:// buckets/prefixes (see dbt_churn/.env.example).
      ATHENA_ML_EXPORT_CHURN_TRAINING_PREFIX: ${{ secrets.ATHENA_ML_EXPORT_CHURN_TRAINING_PREFIX }}
      ATHENA_ML_EXPORT_CURRENT_CUSTOMER_PREFIX: ${{ secrets.ATHENA_ML_EXPORT_CURRENT_CUSTOMER_PREFIX }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.8"

      - name: Configure AWS credentials (OIDC)
        # v4.2.1+ fixes inputs vs env precedence; unset avoids stale runner AWS_* breaking OIDC.
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-dbt-athena-${{ github.run_id }}
          unset-current-credentials: true

      - name: Install dependencies
        run: uv sync --frozen --group dev --group dbt

      - name: dbt deps
        run: uv run dbt deps --project-dir dbt_churn --profiles-dir dbt_churn

      - name: dbt build (Athena)
        run: uv run dbt build --project-dir dbt_churn --profiles-dir dbt_churn
