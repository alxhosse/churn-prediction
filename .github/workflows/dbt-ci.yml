# Lint + dbt parse. SQLFluff's dbt templater opens a Postgres connection during compile;
# the service below must be up (empty DB is enough).
name: dbt CI

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "dbt_churn/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/dbt-ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-not-used
          POSTGRES_DB: churn_prac
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d churn_prac"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DBT_TARGET: dev
      POSTGRES_HOST: "127.0.0.1"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ci-not-used
      POSTGRES_PORT: "5432"
      POSTGRES_DATABASE: churn_prac
      POSTGRES_SCHEMA: dbt_schema
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.8"

      - name: Install dependencies
        run: uv sync --frozen --group dev --group dbt

      - name: dbt deps
        run: uv run dbt deps --project-dir dbt_churn --profiles-dir dbt_churn

      - name: dbt parse
        run: uv run dbt parse --project-dir dbt_churn --profiles-dir dbt_churn

      - name: SQLFluff
        run: bash dbt_churn/scripts/sqlfluff-lint.sh dbt_churn/models dbt_churn/macros dbt_churn/analyses dbt_churn/tests dbt_churn/seeds

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format (check)
        run: uv run ruff format --check .
